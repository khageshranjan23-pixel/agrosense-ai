[theme]
primaryColor = "#2E7D32"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F8E9"
textColor = "#1B1B1B"
font = "sans serif"

[server]
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true
headless = true
port = 8501

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "viewer"
