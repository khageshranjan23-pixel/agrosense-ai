[theme]
primaryColor = "#1B5E20"
backgroundColor = "#F8FAF6"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A301E"
font = "sans serif"

[server]
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true
headless = true
port = 8501

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "viewer"
